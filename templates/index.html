<!-- Index page with a form to post json to /submit -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit JSON</title>
</head><body>
    <h1>Submit JSON</h1>
    <form id="jsonForm">
        <label for="jsonInput">JSON Input:</label><br>
        <textarea id="jsonInput" name="jsonInput" rows="10" cols="  50"></textarea><br>
        <button type="submit">Submit</button>
    </form>     
    <script>
        document.getElementById('jsonForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const jsonInput = document.getElementById('jsonInput').value;
            try {
                const jsonData = JSON.parse(jsonInput);
                fetch('/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(jsonData)
                })
                .then(response => response.json())
                .then(data => {
                    alert('Response from server: ' + JSON.stringify(data));
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error submitting JSON');
                });
            } catch (e) {
                alert('Invalid JSON');
            }
        });
    </script>
</body></html>
